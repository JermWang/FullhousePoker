<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</helmet>
<div style="position:relative;width:{{ w }}px;height:{{ h }}px;font-family:'Space Grotesk',system-ui,sans-serif;">
  <sc-if value="{{ faceDown }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;inset:0;border-radius:{{ r }}px;overflow:hidden;background:#1a1030;box-shadow:inset 0 0 0 1px rgba(255,61,127,0.42), inset 0 0 0 3px #120a26, inset 0 0 0 4px rgba(255,180,61,0.20), 0 4px 10px -5px rgba(0,0,0,0.6);">
      <div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg, rgba(255,61,127,0.16) 0 1px, transparent 1px 7px), repeating-linear-gradient(-45deg, rgba(20,210,200,0.13) 0 1px, transparent 1px 7px);"></div>
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, rgba(255,61,127,0.12), transparent 60%);"></div>
      <div style="position:absolute;inset:0;display:grid;place-items:center;">
        <div style="display:grid;place-items:center;width:{{ crest }}px;height:{{ crest }}px;border-radius:50%;border:1px solid rgba(255,180,61,0.55);background:rgba(255,180,61,0.08);color:#ffb43d;font-size:{{ crestF }}px;font-weight:700;letter-spacing:-0.04em;line-height:1;box-shadow:0 0 0 3px rgba(20,210,200,0.10);">FH</div>
      </div>
    </div>
  </sc-if>
  <sc-if value="{{ faceUp }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;border-radius:{{ r }}px;overflow:hidden;background:radial-gradient(125% 120% at 50% -10%, #f8f5fc 0%, #efe9f7 72%, #e3dcf0 100%);box-shadow:inset 0 0 0 1px rgba(60,40,90,0.14), inset 0 1px 0 rgba(255,255,255,0.8), 0 4px 10px -5px rgba(0,0,0,0.55);color:{{ color }};">
      <div style="position:absolute;top:{{ pad }}px;left:{{ padX }}px;display:flex;flex-direction:column;align-items:center;line-height:0.8;">
        <span style="font-size:{{ rankSize }}px;font-weight:700;letter-spacing:-0.03em;">{{ rankText }}</span>
        <span style="font-size:{{ cornerSym }}px;line-height:1;">{{ sym }}</span>
      </div>
      <div style="position:absolute;inset:0;display:grid;place-items:center;font-size:{{ pip }}px;line-height:1;text-shadow:0 1px 1px rgba(60,40,90,0.18);">{{ sym }}</div>
      <div style="position:absolute;bottom:{{ pad }}px;right:{{ padX }}px;display:flex;flex-direction:column;align-items:center;line-height:0.8;transform:rotate(180deg);">
        <span style="font-size:{{ rankSize }}px;font-weight:700;letter-spacing:-0.03em;">{{ rankText }}</span>
        <span style="font-size:{{ cornerSym }}px;line-height:1;">{{ sym }}</span>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:60,&quot;height&quot;:84},&quot;rank&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;A&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;suit&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;s&quot;,&quot;h&quot;,&quot;d&quot;,&quot;c&quot;],&quot;default&quot;:&quot;s&quot;,&quot;tsType&quot;:&quot;\&quot;s\&quot;|\&quot;h\&quot;|\&quot;d\&quot;|\&quot;c\&quot;&quot;},&quot;faceDown&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;w&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:46,&quot;tsType&quot;:&quot;number&quot;},&quot;h&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:64,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const w = Number(p.w) || 46;
    const h = Number(p.h) || 64;
    const SYM = { s: "\u2660", h: "\u2665", d: "\u2666", c: "\u2663" };
    const suit = p.suit || "s";
    const red = suit === "h" || suit === "d";
    let rankText = p.rank == null ? "A" : String(p.rank);
    if (rankText === "T") rankText = "10";
    return {
      w, h,
      r: Math.max(3, Math.round(w * 0.13)),
      faceDown: !!p.faceDown,
      faceUp: !p.faceDown,
      rankText,
      sym: SYM[suit] || SYM.s,
      color: red ? "#d81f6a" : "#221539",
      rankSize: Math.round(w * 0.37),
      cornerSym: Math.round(w * 0.26),
      pip: Math.round(w * 0.66),
      pad: Math.max(2, Math.round(h * 0.055)),
      padX: Math.max(2, Math.round(w * 0.13)),
      crest: Math.round(w * 0.5),
      crestF: Math.round(w * 0.22),
    };
  }
}
</script>
</body>
</html>
